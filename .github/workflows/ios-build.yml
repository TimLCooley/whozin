name: iOS Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'ios/**'
      - 'capacitor.config.ts'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'Submit for App Store review after upload'
        required: false
        default: false
        type: boolean

jobs:
  build:
    runs-on: macos-15
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Create minimal web assets for Capacitor sync
        run: |
          mkdir -p out
          echo '<html><head><meta http-equiv="refresh" content="0;url=https://whozin.io"></head></html>' > out/index.html

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install Apple certificate and provisioning profile
        env:
          P12_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_P12 }}
          P12_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo "$P12_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          # Install provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo "$PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | grep string | sed 's/.*<string>\(.*\)<\/string>/\1/')
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PROFILE_UUID".mobileprovision

          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> $GITHUB_ENV

      - name: Select Xcode 26
        run: sudo xcode-select -s /Applications/Xcode_26.3.app/Contents/Developer

      - name: Auto-increment build number
        run: |
          # Use a high base + run number to always exceed previous uploads
          NEW_BUILD=$((100 + GITHUB_RUN_NUMBER))
          sed -i '' "s/CURRENT_PROJECT_VERSION = [0-9]*;/CURRENT_PROJECT_VERSION = $NEW_BUILD;/g" ios/App/App.xcodeproj/project.pbxproj
          echo "BUILD_NUMBER=$NEW_BUILD" >> $GITHUB_ENV
          echo "Build number: $NEW_BUILD"

      - name: Build archive
        working-directory: ios/App
        run: |
          xcodebuild archive \
            -project App.xcodeproj \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=3QM6SDB8NG \
            PROVISIONING_PROFILE_SPECIFIER="Whozin App Store" \
            OTHER_CODE_SIGN_FLAGS="--keychain ${{ env.KEYCHAIN_PATH }}" \
            -allowProvisioningUpdates \
            clean archive

      - name: Export IPA
        run: |
          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: whozin-ios-release
          path: ${{ runner.temp }}/export/*.ipa

      - name: Notify Whozin API — build complete
        if: always()
        continue-on-error: true
        env:
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          MSG=$(echo "$COMMIT_MSG" | head -1 | jq -Rs .)
          curl -s -X POST "${{ secrets.WHOZIN_API_URL }}/api/admin/builds" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WHOZIN_BUILD_SECRET }}" \
            -d "{
              \"platform\": \"ios\",
              \"version_code\": ${{ env.BUILD_NUMBER }},
              \"version_name\": \"2.8\",
              \"status\": \"built\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"commit_message\": $MSG,
              \"run_id\": ${{ github.run_id }},
              \"run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" || true

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true

  deploy:
    needs: build
    runs-on: macos-15
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download IPA artifact
        uses: actions/download-artifact@v4
        with:
          name: whozin-ios-release
          path: artifacts/

      - name: Create App Store Connect API key file
        run: |
          mkdir -p ~/private_keys
          echo '${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}' > ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8

      - name: Upload to TestFlight
        run: |
          xcrun altool --upload-app \
            --file artifacts/*.ipa \
            --type ios \
            --apiKey ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --apiIssuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} || \
          xcrun notarytool submit artifacts/*.ipa \
            --key ~/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}.p8 \
            --key-id ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }} \
            --issuer ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }} \
            --wait

      - name: Install Fastlane
        run: gem install fastlane --no-document

      - name: Sync screenshots from admin panel
        continue-on-error: true
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          # Fetch asset URLs
          ASSETS=$(curl -sf "${{ secrets.WHOZIN_API_URL }}/api/admin/store-assets" \
            -H "Authorization: Bearer ${{ secrets.WHOZIN_BUILD_SECRET }}" || echo '{}')

          mkdir -p /tmp/screenshots/en-US

          # Download screenshots by display type
          for DISPLAY_TYPE in APP_IPHONE_67 APP_IPHONE_65 APP_IPHONE_55 APP_IPAD_PRO_129; do
            URLS=$(echo "$ASSETS" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          urls = data.get('ios', {}).get('screenshots', {}).get('$DISPLAY_TYPE', [])
          for u in urls:
              print(u)
          " 2>/dev/null || true)

            IDX=1
            for URL in $URLS; do
              if [ -n "$URL" ]; then
                curl -sfL "$URL" -o "/tmp/screenshots/en-US/${DISPLAY_TYPE}_$(printf '%02d' $IDX).png" || true
                IDX=$((IDX + 1))
              fi
            done
          done

          SCREENSHOT_COUNT=$(find /tmp/screenshots/en-US -name "*.png" 2>/dev/null | wc -l | tr -d ' ')
          if [ "$SCREENSHOT_COUNT" -gt "0" ]; then
            echo "Uploading $SCREENSHOT_COUNT screenshots..."
            cat > /tmp/api_key.json << KEYEOF
            {
              "key_id": "$API_KEY_ID",
              "issuer_id": "$API_ISSUER_ID",
              "key_filepath": "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"
            }
          KEYEOF
            fastlane deliver \
              --skip_binary_upload \
              --skip_metadata \
              --overwrite_screenshots \
              --screenshots_path /tmp/screenshots \
              --app_identifier io.whozin.app \
              --force \
              --api_key_path /tmp/api_key.json
            echo "Screenshots synced!"
          else
            echo "No screenshots to upload"
          fi

      - name: Submit for App Store review
        if: ${{ inputs.submit_for_review == true }}
        env:
          API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > /tmp/api_key.json << KEYEOF
          {
            "key_id": "$API_KEY_ID",
            "issuer_id": "$API_ISSUER_ID",
            "key_filepath": "$HOME/private_keys/AuthKey_${API_KEY_ID}.p8"
          }
          KEYEOF
          fastlane run deliver \
            submit_for_review:true \
            automatic_release:true \
            skip_metadata:true \
            skip_screenshots:true \
            skip_binary_upload:true \
            api_key_path:/tmp/api_key.json

      - name: Notify Whozin API — deploy complete
        if: always()
        run: |
          STATUS="deployed"
          if [ "${{ job.status }}" != "success" ]; then STATUS="failed"; fi
          curl -s -X POST "${{ secrets.WHOZIN_API_URL }}/api/admin/builds" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WHOZIN_BUILD_SECRET }}" \
            -d "{
              \"platform\": \"ios\",
              \"status\": \"$STATUS\",
              \"track\": \"testflight\",
              \"run_id\": ${{ github.run_id }},
              \"run_url\": \"https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }" || true
